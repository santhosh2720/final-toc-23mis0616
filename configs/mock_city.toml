[project]
name = "mock-city-grid"
seed = 7

[simulation]
backend = "mock"
episode_seconds = 1800
control_interval = 15
warmup_seconds = 60
grid_rows = 3
grid_cols = 3
arrival_rate = 0.42
service_rate = 0.75
transfer_probability = 0.72
max_queue = 30

[scenario]
name = "rush_hour"
demand_multiplier = 1.35
directional_bias_ns = 0.62
directional_bias_ew = 0.38
noise = 0.05
emergency_vehicle_rate = 0.02

[controller]
name = "hybrid"
phase_actions = ["hold", "ns_green", "ew_green", "pedestrian_all_red"]
genetic_population = 24
genetic_generations = 18
qaoa_layers = 3
qaoa_trials = 220
prediction_horizon_steps = 8
coordination_bonus = -12.0
one_hot_penalty = 40.0
min_green_seconds = 15
max_green_seconds = 90

[sumo]
sumo_binary = ""
sumocfg_path = ""
use_gui = false

[output]
directory = "reports"
